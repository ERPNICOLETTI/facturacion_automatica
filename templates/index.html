<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Pino | Dashboard Ventas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.05) 0px, transparent 40%);
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 0.5rem;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-dim);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
        }

        /* Main */
        main {
            margin-left: 260px;
            flex: 1;
            padding: 2rem 3rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .section-content {
            display: none;
        }

        .section-content.active {
            display: block;
        }

        .btn-sync {
            background: var(--accent-primary);
            color: var(--bg-dark);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-sync:hover {
            transform: scale(1.05);
            background: #7dd3fc;
        }

        .btn-sync:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mini-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
        }

        .mini-card h3 {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .mini-card p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Table */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-full {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
        }

        .type-madryn {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent-secondary);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-filter {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-filter.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .btn-pdf {
            color: var(--accent-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-nc {
            color: #f87171;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 4px;
        }

        .btn-pdf:hover,
        .btn-nc:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Buscador */
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 16px 10px 40px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <aside>
        <div class="logo"><i class="ph-fill ph-rocket-launch"></i> PINO ERP</div>
        <nav>
            <ul>
                <li><a href="javascript:void(0)" class="nav-link active" id="nav-ventas"><i
                            class="ph-fill ph-chart-pie"></i> Ventas Totales</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="title-main">Dashboard de Facturación</h1>
                <p id="subtitle-main" style="color:var(--text-dim)">Control Multi-Plataforma (MeLi + Tiendanube)</p>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="btn-sync" id="btn-sync-labels" onclick="syncLabels()">
                    <i id="icon-sync" class="ph-bold ph-arrows-clockwise"></i> Sincronizar Etiquetas
                </button>
                <div id="meli-status" class="badge" style="background:rgba(255,255,255,0.05)">Conectando MeLi...</div>
            </div>
        </header>

        <div id="section-ventas" class="section-content active">
            <div class="stats-grid">
                <div class="mini-card">
                    <h3>Tiendanube</h3>
                    <p id="stat-tn" style="color:#38bdf8">0</p>
                </div>
                <div class="mini-card">
                    <h3>Madryn (Almacén)</h3>
                    <p id="stat-madryn" style="color:var(--accent-secondary)">0</p>
                </div>
                <div class="mini-card">
                    <h3>Full (MeLi)</h3>
                    <p id="stat-full" style="color:var(--accent-primary)">0</p>
                </div>
                <div class="mini-card" style="opacity: 0.8">
                    <h3>Total Ventas</h3>
                    <p id="stat-total">0</p>
                </div>
                <div class="mini-card">
                    <h3>Devoluciones</h3>
                    <p id="stat-refunded" style="color:#f87171">$ 0</p>
                </div>
            </div>

            <div class="filters" style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                <div style="display:flex; gap: 12px;">
                    <button class="btn-filter active" onclick="setFilter('ALL')">Todas</button>
                    <button class="btn-filter" onclick="setFilter('TN')">Tiendanube</button>
                    <button class="btn-filter" onclick="setFilter('MADRYN')">Madryn (Almacén)</button>
                    <button class="btn-filter" onclick="setFilter('FULL')">Full (MeLi)</button>
                </div>

                <div class="search-container">
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" class="search-input"
                        placeholder="Buscar por nombre, ID u orden..." oninput="handleSearch(this.value)">
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ORDEN</th>
                            <th>PLATAFORMA</th>
                            <th>CLIENTE</th>
                            <th>LOGÍSTICA</th>
                            <th>MONTO</th>
                            <th>ESTADO FACTURA</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="ventas-body">
                        <!-- Dinámico -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentFilter = 'ALL';
        let searchQuery = '';
        let allVentas = [];

        function handleSearch(val) {
            searchQuery = val.toLowerCase();
            renderTable();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.btn-filter').forEach(btn => {
                const isAll = filter === 'ALL' && btn.innerText.includes('Todas');
                const isTn = filter === 'TN' && btn.innerText.includes('Tiendanube');
                const isMadryn = filter === 'MADRYN' && btn.innerText.includes('Madryn');
                const isFull = filter === 'FULL' && btn.innerText.includes('Full');
                btn.classList.toggle('active', isAll || isTn || isFull || isMadryn);
            });
            renderTable();
        }

        async function loadData() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                // Actualizar Stats
                document.getElementById('stat-tn').innerText = data.meli.tn_count;
                document.getElementById('stat-madryn').innerText = data.meli.madryn_count;
                document.getElementById('stat-full').innerText = data.meli.full_count;
                document.getElementById('stat-total').innerText = data.meli.sales_count;
                document.getElementById('stat-refunded').innerText = `$ ${data.meli.total_refunded.toLocaleString()}`;
                document.getElementById('meli-status').innerText = `MeLi: ${data.meli.user} (${data.meli.status})`;

                allVentas = data.ventas;
                renderTable();
            } catch (e) {
                console.error(e);
            }
        }

        function renderTable() {
            const body = document.getElementById('ventas-body');
            body.innerHTML = '';

            let filtered = allVentas;

            // 1. Filtrar por búsqueda
            if (searchQuery) {
                filtered = filtered.filter(v =>
                    v.cliente.toLowerCase().includes(searchQuery) ||
                    v.id.toString().toLowerCase().includes(searchQuery)
                );
            }

            // 2. Filtrar por solapa (Plataforma)
            if (currentFilter === 'TN') {
                filtered = filtered.filter(v => v.source === 'TN');
            } else if (currentFilter === 'MADRYN' || currentFilter === 'FULL') {
                filtered = filtered.filter(v => v.tipo === currentFilter && v.source === 'MELI');
            }

            filtered.forEach(v => {
                const row = document.createElement('tr');
                const platformIcon = v.source === 'MELI' ? '<i class="ph-fill ph-shopping-bag" style="color:#fbbf24"></i> MeLi' : '<i class="ph-fill ph-storefront" style="color:#38bdf8"></i> TN';
                row.innerHTML = `
                    <td style="font-weight:600; font-size:0.85rem">#${v.id}</td>
                    <td style="font-size:0.8rem; font-weight:600">${platformIcon}</td>
                    <td>${v.cliente}</td>
                    <td><span class="badge type-${v.tipo.toLowerCase()}">${v.tipo}</span></td>
                    <td style="font-family: monospace; font-weight:700">${v.monto}</td>
                    <td>
                        <span class="dot" style="background:${v.color}"></span>
                        <span style="font-size:0.8rem; font-weight:500; color:${v.color}">${v.status}</span>
                    </td>
                    <td>
                        <div style="display:flex; flex-direction:column; gap:4px">
                            ${v.has_pdf ? `<a href="${v.pdf_url}" class="btn-pdf" target="_blank"><i class="ph ph-file-pdf"></i> Factura</a>` : ''}
                            ${v.has_nc ? `<a href="${v.nc_url}" class="btn-nc" target="_blank"><i class="ph ph-file-arrow-down"></i> Nota Crédito</a>` : ''}
                            ${!v.has_pdf && !v.has_nc ? '-' : ''}
                        </div>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        async function syncLabels() {
            const btn = document.getElementById('btn-sync-labels');
            const icon = document.getElementById('icon-sync');

            btn.disabled = true;
            icon.classList.add('animate-spin');

            try {
                const res = await fetch('/api/sync-labels', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    alert("✅ " + data.message);
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (e) {
                console.error(e);
                alert("❌ Error de conexión al sincronizar.");
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
                loadData();
            }
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
    <style>
        .animate-spin {
            display: inline-block;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
